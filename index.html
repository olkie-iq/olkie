<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Olkie - Iraqi Game Developer, Programmer & Content Creator. Godot Engine games, programming projects, and more.">
<meta name="keywords" content="Olkie, game developer, Iraqi programmer, Godot Engine, مبرمج ألعاب عراقي, تطوير ألعاب">
<meta property="og:title" content="Olkie World | Game Developer & Programmer">
<title>Olkie World | Game Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
:root{
  --neon:#ff8c00;--neon2:#ff4500;--neon3:#ffb347;
  --glow:rgba(255,140,0,0.28);--glow-s:rgba(255,140,0,0.5);
  --bg:#030303;--surface:rgba(13,13,13,0.95);--surface2:rgba(20,20,20,0.92);
  --border:rgba(255,140,0,0.13);--border-h:rgba(255,140,0,0.48);
  --text:#ece8df;--text-dim:#68645e;--text-mid:#a09888;
}
body.morning{
  --bg:#07101c;--surface:rgba(9,19,34,0.95);--surface2:rgba(12,24,42,0.92);
  --border:rgba(100,180,255,0.18);--border-h:rgba(100,180,255,0.5);
  --text:#d6ecff;--text-dim:#38587a;--text-mid:#7aaabb;
  --neon:#4db8ff;--neon2:#0077cc;--neon3:#80ccff;
  --glow:rgba(77,184,255,0.28);--glow-s:rgba(77,184,255,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{min-height:100vh;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .5s,color .5s;}

/* ── NOISE ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:0.45;}

/* ── GRID ── */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,140,0,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,140,0,0.02) 1px,transparent 1px);background-size:50px 50px;}
body.morning .grid-bg{background-image:linear-gradient(rgba(77,184,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(77,184,255,0.03) 1px,transparent 1px);}
#matrix-canvas{position:fixed;inset:0;z-index:0;opacity:0.08;pointer-events:none;}
#particles-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.5;}

/* ══════════════════════
   WELCOME
══════════════════════ */
#welcome-screen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s ease,transform .9s ease;}
#welcome-screen::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:scan 5s linear infinite;opacity:0.3;}
@keyframes scan{0%{top:0;}100%{top:100%;}}
#welcome-screen.hiding{opacity:0;transform:scale(1.06);pointer-events:none;}

/* terminal */
#terminal{position:absolute;inset:0;background:rgba(0,0,0,0.97);display:none;flex-direction:column;z-index:10;padding:32px;}
#terminal.open{display:flex;}
#terminal-output{flex:1;overflow-y:auto;font-family:'Courier New',monospace;font-size:0.8rem;color:#00ff41;line-height:1.8;margin-bottom:12px;}
#terminal-output .t-line{opacity:0;animation:tline .08s forwards;}
@keyframes tline{to{opacity:1;}}
#terminal-input-row{display:flex;align-items:center;gap:8px;border-top:1px solid rgba(0,255,65,0.15);padding-top:12px;}
#terminal-prompt{color:var(--neon);font-family:'Courier New',monospace;font-size:0.8rem;white-space:nowrap;}
#terminal-input{flex:1;background:transparent;border:none;outline:none;color:#00ff41;font-family:'Courier New',monospace;font-size:0.8rem;caret-color:#00ff41;}
#terminal-close{position:absolute;top:16px;right:16px;background:transparent;border:1px solid rgba(255,140,0,0.3);color:var(--neon);font-family:'Orbitron',monospace;font-size:0.58rem;padding:5px 12px;cursor:pointer;letter-spacing:0.1em;transition:all .2s;}
#terminal-close:hover{background:var(--neon);color:#000;}

.ui-corner{position:absolute;font-family:'Orbitron',monospace;font-size:0.52rem;color:var(--text-dim);letter-spacing:0.1em;opacity:0.42;}
.ui-corner.tl{top:22px;right:22px;}.ui-corner.tr{top:22px;left:22px;}
.ui-corner.bl{bottom:58px;right:22px;}.ui-corner.br{bottom:58px;left:22px;}
.ui-corner.btn{opacity:0.65;border-bottom:1px solid rgba(255,140,0,0.4);cursor:pointer;padding-bottom:1px;transition:opacity .2s;}
.ui-corner.btn:hover{opacity:1;}

.avatar-frame{position:relative;width:150px;height:150px;margin-bottom:28px;}
.avatar-frame::before,.avatar-frame::after{content:'';position:absolute;border-radius:50%;}
.avatar-frame::before{inset:-12px;border:1px solid transparent;border-top-color:var(--neon);border-right-color:rgba(255,140,0,0.2);animation:orbit 3s linear infinite;}
.avatar-frame::after{inset:-22px;border:1px solid transparent;border-bottom-color:var(--neon2);animation:orbit 5s linear infinite reverse;}
@keyframes orbit{to{transform:rotate(360deg);}}
.corner-box{position:absolute;width:13px;height:13px;}
.corner-box::before,.corner-box::after{content:'';position:absolute;background:var(--neon);}
.corner-box::before{width:100%;height:1.5px;top:0;}.corner-box::after{width:1.5px;height:100%;top:0;}
.corner-tl{top:-24px;right:-24px;}.corner-tr{top:-24px;left:-24px;transform:scaleX(-1);}
.corner-bl{bottom:-24px;right:-24px;transform:scaleY(-1);}.corner-br{bottom:-24px;left:-24px;transform:scale(-1);}
.profile-img{width:150px;height:150px;border-radius:50%;border:2px solid var(--neon);object-fit:cover;display:block;position:relative;z-index:1;box-shadow:0 0 40px var(--glow),0 0 80px rgba(255,140,0,0.07);}

.welcome-name{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;letter-spacing:0.14em;color:var(--text);margin-bottom:5px;text-transform:uppercase;}
.welcome-name span{color:var(--neon);text-shadow:0 0 22px var(--glow);}
.typing-wrapper{font-size:0.8rem;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:36px;height:1.6em;display:flex;align-items:center;justify-content:center;gap:4px;text-transform:uppercase;}
#typed-text{color:var(--neon);font-weight:700;}
.t-cursor{display:inline-block;width:2px;height:.9em;background:var(--neon);animation:blink .7s step-end infinite;vertical-align:middle;}
@keyframes blink{50%{opacity:0;}}

/* HEX BTN */
.hex-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:none;cursor:pointer;font-family:'Orbitron',monospace;transition:color .3s,filter .3s;text-decoration:none;}
.hex-btn .hb-bg{position:absolute;inset:0;border:1.5px solid var(--neon);background:transparent;clip-path:polygon(18px 0%,calc(100% - 18px) 0%,100% 50%,calc(100% - 18px) 100%,18px 100%,0% 50%);transition:background .3s,box-shadow .3s;}
.hex-btn:hover .hb-bg{background:var(--neon);box-shadow:0 0 28px var(--glow);}
.hex-btn:hover{filter:drop-shadow(0 0 12px var(--neon));}
.hex-btn .hb-txt{position:relative;z-index:1;}
.enter-btn{width:220px;padding:16px 0;color:var(--neon);font-size:0.82rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;}
.enter-btn:hover{color:#000;}
.status-bar{position:absolute;bottom:28px;display:flex;align-items:center;gap:9px;font-family:'Orbitron',monospace;font-size:0.56rem;color:var(--text-dim);letter-spacing:0.15em;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--neon);box-shadow:0 0 7px var(--neon);animation:pdot 1.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.6);}}

/* ══════════════════════
   MAIN
══════════════════════ */
.main-container{max-width:780px;margin:0 auto;padding:50px 24px 140px;position:relative;z-index:10;display:none;}
.main-container.visible{display:block;animation:fadeSlide .8s ease forwards;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

/* page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.page-logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;letter-spacing:0.15em;color:var(--neon);text-shadow:0 0 18px var(--glow);}
.page-logo span{color:var(--text-dim);font-weight:400;font-size:0.65rem;}
.mode-badge{display:flex;align-items:center;gap:6px;font-family:'Orbitron',monospace;font-size:0.58rem;color:var(--neon);letter-spacing:0.14em;}
.mode-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--neon);box-shadow:0 0 5px var(--neon);}

/* section labels */
.section-label{font-family:'Orbitron',monospace;font-size:0.56rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:14px;margin-top:28px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
html[dir="rtl"] .section-label::after{background:linear-gradient(to left,var(--border),transparent);}

/* visitor */
.visitor-strip{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:border-color .3s;}
.visitor-strip:hover{border-color:var(--border-h);}
.visitor-label{font-family:'Orbitron',monospace;font-size:0.52rem;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase;}
.visitor-count{font-family:'Orbitron',monospace;font-size:0.92rem;font-weight:700;color:var(--neon);letter-spacing:0.1em;}

/* cards */
.card{position:relative;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:border-color .3s,box-shadow .3s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:linear-gradient(to bottom,var(--neon),var(--neon2));transition:height .4s;}
.card:hover::before,.card.active::before{height:100%;}
.card:hover{border-color:var(--border-h);box-shadow:0 2px 30px rgba(255,140,0,0.05);}
.card.active{border-color:rgba(255,140,0,0.38);box-shadow:0 4px 40px rgba(255,140,0,0.08);}
.card-header{padding:19px 22px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .2s;}
.card-header:hover{background:rgba(255,140,0,0.02);}
.card-num{font-family:'Orbitron',monospace;font-size:0.55rem;color:var(--neon);letter-spacing:0.2em;margin-bottom:3px;display:block;opacity:0.55;}
.card-title{font-size:0.98rem;font-weight:700;color:var(--text);}
.toggle-icon{width:28px;height:28px;border:1.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--neon);transition:transform .35s,background .25s;flex-shrink:0;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.card.active .toggle-icon{transform:rotate(45deg);background:var(--neon);color:#000;}
.card-content{overflow:hidden;max-height:0;transition:max-height .5s ease,padding .3s;padding:0 22px;color:var(--text-mid);line-height:2;font-size:0.93rem;border-top:1px solid transparent;}
.card.active .card-content{max-height:900px;padding:16px 22px 22px;border-top-color:var(--border);}

/* skills */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:480px){.skills-grid{grid-template-columns:1fr;}}
.skill-item{display:flex;flex-direction:column;gap:7px;}
.skill-header{display:flex;justify-content:space-between;align-items:center;}
.skill-label{display:flex;align-items:center;gap:9px;font-size:0.88rem;font-weight:600;color:var(--text);}
.skill-icon{font-size:1.15rem;line-height:1;}
.skill-pct{font-family:'Orbitron',monospace;font-size:0.6rem;color:var(--neon);letter-spacing:0.1em;}
.skill-bar{height:3px;background:rgba(255,140,0,0.08);overflow:hidden;border-radius:2px;}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--neon2),var(--neon),var(--neon3));width:0%;transition:width 1.3s cubic-bezier(0.25,0.46,0.45,0.94);box-shadow:0 0 8px var(--glow);}
.card.active .skill-fill{width:var(--pct);}

/* projects */
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:580px){.projects-grid{grid-template-columns:1fr;}}
.project-card{position:relative;background:var(--surface2);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .3s,transform .3s,box-shadow .3s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.project-card:hover{border-color:var(--border-h);transform:translateY(-4px);box-shadow:0 12px 36px rgba(255,140,0,0.11);}
.project-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--neon2),var(--neon));opacity:0;transition:opacity .3s;}
.project-card:hover::after{opacity:1;}
.project-thumb{width:100%;height:112px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:linear-gradient(135deg,#0e0e0e,#1a0f00,#0a0800);transition:transform .4s;}
.project-card:hover .project-thumb{transform:scale(1.07);}
.project-info{padding:12px 14px;}
.project-title{font-size:0.87rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.project-desc{font-size:0.73rem;color:var(--text-dim);line-height:1.6;margin-bottom:10px;}
.project-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.project-tag{padding:2px 7px;border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:0.46rem;color:var(--neon);letter-spacing:0.08em;}
.play-btn{font-family:'Orbitron',monospace;font-size:0.5rem;letter-spacing:0.1em;padding:4px 10px;border:1px solid var(--neon);color:var(--neon);background:transparent;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;white-space:nowrap;}
.play-btn:hover{background:var(--neon);color:#000;box-shadow:0 0 12px var(--glow);}

/* devlog */
.devlog-entry{padding:14px 0;border-bottom:1px solid var(--border);}
.devlog-entry:last-child{border-bottom:none;padding-bottom:0;}
.devlog-date{font-family:'Orbitron',monospace;font-size:0.52rem;color:var(--neon);letter-spacing:0.16em;margin-bottom:5px;opacity:0.75;}
.devlog-title{font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.devlog-text{font-size:0.82rem;color:var(--text-mid);line-height:1.85;}
.devlog-tags{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.devlog-tag{padding:2px 8px;border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:0.44rem;color:var(--neon3);letter-spacing:0.08em;}

/* social cards — improved */
.social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:520px){.social-grid{grid-template-columns:repeat(2,1fr);}}
.social-card{
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:9px;
  padding:20px 10px 16px;
  background:var(--surface2);border:1px solid var(--border);
  text-decoration:none;cursor:pointer;
  transition:border-color .3s,transform .3s,box-shadow .3s,background .3s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  overflow:hidden;
}
.social-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,140,0,0.04),transparent 60%);
  opacity:0;transition:opacity .3s;
}
.social-card:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 10px 28px rgba(255,140,0,0.1);}
.social-card:hover::before{opacity:1;}
.social-card .top-line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--neon);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.social-card:hover .top-line{transform:scaleX(1);}
.social-icon{font-size:1.7rem;line-height:1;filter:drop-shadow(0 0 6px rgba(255,140,0,0));}
.social-card:hover .social-icon{filter:drop-shadow(0 0 8px var(--glow));}
.social-name{font-family:'Orbitron',monospace;font-size:0.5rem;color:var(--neon);letter-spacing:0.14em;text-align:center;text-transform:uppercase;}
.social-handle{font-size:0.7rem;color:var(--text-dim);text-align:center;transition:color .3s;}
.social-card:hover .social-handle{color:var(--text-mid);}

/* contact */
.contact-form{display:flex;flex-direction:column;gap:13px;}
.form-label{display:block;font-family:'Orbitron',monospace;font-size:0.56rem;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;}
.form-input,.form-textarea{width:100%;padding:11px 15px;background:rgba(255,140,0,0.025);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.9rem;outline:none;transition:border-color .3s,box-shadow .3s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
.form-textarea{min-height:96px;resize:vertical;}
.form-input:focus,.form-textarea:focus{border-color:var(--neon);box-shadow:0 0 16px rgba(255,140,0,0.07);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-dim);}
.submit-btn{align-self:flex-start;width:180px;padding:12px 0;color:var(--neon);font-size:0.7rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;}
.submit-btn:hover{color:#000;}
.formspree-note{font-size:0.7rem;color:var(--text-dim);margin-top:5px;font-style:italic;}

/* controls */
.controls{position:fixed;bottom:0;left:0;right:0;z-index:500;padding:13px 22px;display:none;gap:10px;background:linear-gradient(to top,rgba(3,3,3,0.99) 55%,transparent);backdrop-filter:blur(8px);}
.control-btn{position:relative;flex:1;padding:11px 14px;background:transparent;border:none;color:var(--text-dim);font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:color .25s,filter .25s;}
.control-btn .hb-bg{position:absolute;inset:0;border:1px solid var(--border);background:rgba(6,6,6,0.97);clip-path:polygon(14px 0%,calc(100% - 14px) 0%,100% 50%,calc(100% - 14px) 100%,14px 100%,0% 50%);transition:background .25s,border-color .25s;}
.control-btn .hb-txt{position:relative;z-index:1;}
.control-btn:hover .hb-bg{border-color:var(--neon);background:rgba(255,140,0,0.05);}
.control-btn:hover{color:var(--neon);filter:drop-shadow(0 0 8px var(--glow));}

/* toast */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--neon);color:var(--neon);font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.14em;padding:9px 22px;z-index:9000;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 50%,calc(100% - 10px) 100%,10px 100%,0% 50%);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,140,0,0.2);border-radius:2px;}

@media(max-width:480px){
  .main-container{padding:34px 14px 126px;}
  .card-header{padding:15px 16px;}
  .card.active .card-content{padding:13px 16px 18px;}
  .social-grid{grid-template-columns:repeat(2,1fr);}
  .projects-grid{grid-template-columns:1fr;}
  .welcome-name{letter-spacing:0.08em;}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<canvas id="matrix-canvas"></canvas>
<canvas id="particles-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- TERMINAL -->
<div id="terminal">
  <button id="terminal-
