<!DOCTYPE html>

<head>

    <style>
        :root {
            --neon: #ff8c00;
            --neon2: #ff4500;
            --glow: rgba(255,140,0,0.35);
            --glow-strong: rgba(255,140,0,0.6);
            --bg: #050505;
            --bg2: #0a0a0a;
            --surface: rgba(18,18,18,0.92);
            --border: rgba(255,140,0,0.18);
            --border-hover: rgba(255,140,0,0.55);
            --text: #f0ece4;
            --text-dim: #7a7570;
            --text-mid: #b0a898;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* LOADER */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader.hide { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border);
            border-top-color: var(--neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* NOISE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.55;
        }

        /* CANVAS */
        #matrix-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.12;
            pointer-events: none;
        }

        /* GRID BG */
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,140,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,140,0,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* WELCOME SCREEN */
        #welcome-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #welcome-screen.hiding {
            opacity: 0;
            transform: scale(1.06);
            pointer-events: none;
        }

        #welcome-screen::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.4;
        }

        @keyframes scan {
            0%   { top: 0%; }
            100% { top: 100%; }
        }

        .avatar-frame {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 32px;
        }

        .avatar-frame::before,
        .avatar-frame::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: orbit 3s linear infinite;
        }

        .avatar-frame::before {
            inset: -10px;
            border: 1px solid transparent;
            border-top-color: var(--neon);
            border-right-color: rgba(255,140,0,0.3);
        }

        .avatar-frame::after {
            inset: -20px;
            border: 1px solid transparent;
            border-bottom-color: var(--neon2);
            border-left-color: rgba(255,69,0,0.2);
            animation-duration: 5s;
            animation-direction: reverse;
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(255,140,0,0.25), inset 0 0 20px rgba(255,140,0,0.05);
        }

        .corner-box {
            position: absolute;
            width: 12px;
            height: 12px;
        }

        .corner-box::before,
        .corner-box::after {
            content: '';
            position: absolute;
            background: var(--neon);
        }

        .corner-box::before { width: 100%; height: 1.5px; top: 0; }
        .corner-box::after  { width: 1.5px; height: 100%; top: 0; }

        .corner-tl { top: -24px; right: -24px; }
        .corner-tr { top: -24px; left: -24px; transform: scaleX(-1); }
        .corner-bl { bottom: -24px; right: -24px; transform: scaleY(-1); }
        .corner-br { bottom: -24px; left: -24px; transform: scale(-1); }

        .welcome-name {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: 900;
            letter-spacing: 0.12em;
            color: var(--text);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .typing-wrapper {
            font-size: 0.88rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            margin-bottom: 36px;
            height: 1.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-transform: uppercase;
        }

        #typed-text { color: var(--neon); font-weight: 600; }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--neon);
            animation: blink 0.7s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .enter-btn {
            position: relative;
            width: 180px;
            padding: 14px 0;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: color 0.3s ease, box-shadow 0.3s ease;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--neon);
            transform: translateX(-105%);
            transition: transform 0.35s ease;
            z-index: 0;
        }

        .enter-btn:hover::before { transform: translateX(0); }
        .enter-btn:hover {
            color: #000;
            box-shadow: 0 0 40px var(--glow-strong);
        }

        .enter-btn span { position: relative; z-index: 1; }

        .status-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            white-space: nowrap;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        /* MAIN CONTENT */
        .main-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 52px 24px 130px;
            position: relative;
            z-index: 10;
            display: none;
        }

        .main-container.visible {
            display: block;
            animation: fadeSlide 0.8s ease forwards;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .page-header-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .mode-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'Orbitron', monospace;
            font-size: 0.62rem;
            color: var(--neon);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .mode-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 6px var(--neon);
        }

        /* CARDS */
        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 0;
            background: linear-gradient(to bottom, var(--neon), var(--neon2));
            transition: height 0.4s ease;
        }

        .card:hover::before,
        .card.active::before { height: 100%; }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 30px rgba(255,140,0,0.07), inset 0 0 30px rgba(255,140,0,0.02);
        }

        .card.active {
            border-color: rgba(255,140,0,0.45);
            box-shadow: 0 0 40px rgba(255,140,0,0.1), inset 0 0 40px rgba(255,140,0,0.03);
        }

        .card-header {
            padding: 20px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s ease;
        }

        .card-header:hover { background: rgba(255,140,0,0.03); }

        .card-num {
            font-family: 'Orbitron', monospace;
            font-size: 0.62rem;
            color: var(--neon);
            letter-spacing: 0.2em;
            margin-bottom: 3px;
            display: block;
            opacity: 0.7;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        .toggle-icon {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--neon);
            transition: transform 0.35s ease, background 0.25s ease, border-color 0.25s ease;
            flex-shrink: 0;
            clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
        }

        .card.active .toggle-icon {
            transform: rotate(45deg);
            background: var(--neon);
            color: #000;
            border-color: var(--neon);
        }

        .card-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.45s ease, padding 0.3s ease;
            padding: 0 24px;
            color: var(--text-mid);
            line-height: 2;
            font-size: 0.95rem;
            border-top: 1px solid transparent;
        }

        .card.active .card-content {
            max-height: 400px;
            padding: 16px 24px 24px;
            border-top-color: var(--border);
        }

        /* LINKS */
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: rgba(255,140,0,0.04);
            color: var(--text-mid);
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.25s ease;
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
        }

        .btn-link:hover {
            background: var(--neon);
            border-color: var(--neon);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,140,0,0.3);
        }

        /* CONTROLS */
        .controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 500;
            padding: 14px 24px;
            display: none;
            gap: 10px;
            background: linear-gradient(to top, rgba(5,5,5,0.98) 50%, transparent);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
        }

        .control-btn {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid var(--border);
            background: rgba(10,10,10,0.95);
            color: var(--text-mid);
            font-family: 'Orbitron', monospace;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
        }

        .control-btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            background: rgba(255,140,0,0.06);
            box-shadow: 0 0 20px rgba(255,140,0,0.1);
        }

        /* MORNING MODE */
        body.morning { --bg:#0b1624; --bg2:#0d1e30; --surface:rgba(10,22,40,0.92); --text:#ddeeff; --text-dim:#5a7a99; --text-mid:#8aaabb; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,140,0,0.3); }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .main-container { padding: 36px 16px 120px; }
            .card-header { padding: 16px 18px; }
            .card.active .card-content { padding: 14px 18px 20px; font-size: 0.85rem; line-height: 1.7; }
            .welcome-name { letter-spacing: 0.06em; }
            .btn-link { padding: 8px 16px; font-size: 0.8rem; width: 100%; justify-content: center; }
            .controls { padding: 10px 16px; gap: 8px; }
            .control-btn { padding: 8px 10px; font-size: 0.6rem; }
        }
    </style>
</head>

    <script>
        // ==================== TRANSLATIONS ====================
        var T = {
            ar: {
                welcome: "OLKIE <span style='color:var(--neon);text-shadow:0 0 20px rgba(255,140,0,0.5)'>WORLD</span>",
                words: ["مبرمج", "مصمم", "صانع ألعاب"],
                enter: "دخول",
                status: "SYSTEM ONLINE",
                pageHeader: "OLKIE.PORTFOLIO",
                n1:"// 01", h1:"مَن أنا؟",
                c1:"اسمي أولكي، مبرمج ومصمم، ولدي بعض مشاريع الألعاب التي برمجتها. أرجو أن تستمتعوا وأنتم تجربون ألعابي!",
                n2:"// 02", h2:"ألعابي ومجتمعي",
                b1:"🎮 Itch.io", b2:"💬 Discord", b3:"🎥 YouTube",
                n3:"// 03", h3:"الحسابات",
                modeN:"NIGHT MODE", modeM:"MORNING MODE",
                btnMode:"TOGGLE MODE", langSwitch:"EN", home:"🏠 الرئيسية", dir:"rtl"
            },
            en: {
                welcome: "OLKIE <span style='color:var(--neon);text-shadow:0 0 20px rgba(255,140,0,0.5)'>WORLD</span>",
                words: ["Programmer","Designer","Game Creator"],
                enter: "ENTER",
                status: "SYSTEM ONLINE",
                pageHeader: "OLKIE.PORTFOLIO",
                n1:"// 01", h1:"Who Am I?",
                c1:"My name is Olkie, a programmer and designer with several game projects I built from scratch. Hope you enjoy playing them!",
                n2:"// 02", h2:"Games & Community",
                b1:"🎮 Itch.io", b2:"💬 Discord", b3:"🎥 YouTube",
                n3:"// 03", h3:"Accounts",
                modeN:"NIGHT MODE", modeM:"MORNING MODE",
                btnMode:"TOGGLE MODE", langSwitch:"عربي", home:"🏠 HOME", dir:"ltr"
            }
        };

        var currentLang = 'ar';

        // ==================== LOADER ====================
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('loader');
                loader.classList.add('hide');
                setTimeout(function() { loader.style.display = 'none'; }, 500);
            }, 500);
        });

        // ==================== TYPING EFFECT ====================
        var typedEl = document.getElementById('typed-text');
        var wordIndex = 0;
        var charIndex = 0;
        var isDeleting = false;
        var typingTimeout;

        function type() {
            var words = T[currentLang].words;
            var word = words[wordIndex];
            isDeleting ? charIndex-- : charIndex++;
            typedEl.textContent = word.substring(0, charIndex);
            var speed = isDeleting ? 70 : 120;
            if (!isDeleting && charIndex === word.length) { speed = 1600; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % words.length; speed = 350; }
            typingTimeout = setTimeout(type, speed);
        }
        type();

        // ==================== LANGUAGE SWITCH ====================
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('olkie_lang', currentLang);
            var d = T[currentLang];
            document.documentElement.dir = d.dir;
            document.documentElement.lang = currentLang;
            document.getElementById('welcomeText').innerHTML = d.welcome;
            document.getElementById('enterBtn').querySelector('span').textContent = d.enter;
            document.getElementById('statusLabel').textContent = d.status;
            document.getElementById('pageHeaderTitle').textContent = d.pageHeader;
            document.getElementById('n1').textContent = d.n1;
            document.getElementById('h1').textContent = d.h1;
            document.getElementById('c1').textContent = d.c1;
            document.getElementById('n2').textContent = d.n2;

        // ==================== SOUND EFFECT (simple beep) ====================
        function playClickSound() {
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var oscillator = audioCtx.createOscillator();
                var gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.1;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
                audioCtx.resume();
            } catch(e) { console.log('Audio not supported'); }
        }

        var fontSize = 13;
        var drops = [];
        var animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drops = [];
            var cols = Math.floor(canvas.width / fontSize);
            for (var i = 0; i < cols; i++) drops.push(Math.random() * -80);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.07)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor;
            ctx.font = fontSize + 'px monospace';
            for (var i = 0; i < drops.length; i++) {
                ctx.fillText(chars.charAt(Math.floor(Math.random() * chars.length)), i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        function animateMatrix() {
            drawMatrix();
            animationId = requestAnimationFrame(animateMatrix);
        }
